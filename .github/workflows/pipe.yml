name: First-Deploy-Docker


on:
  push:
    branches:
      - main

jobs:
  Build_image:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    - name: Build image
      run: docker build -t deployapp:1 .
    - name: Run Docker
      run: |
        docker run -d --rm --name web -p 80:8080 deployapp:1
        sleep 30
    - name: Check container 
      run: docker ps
    - name: Web App
      run: curl http://localhost:80
