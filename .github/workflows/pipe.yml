name: First-Deploy-Docker


on:
  push:
    branches:
      - main

jobs:
  Build_image:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    - name: Build image
      run: docker build -t ${{ secrets.D_TOKEN }}/docker_nginx:1 .
    - name: Run Docker
      run: |
        docker run -d --rm --name web -p 8080:80 ${{ secrets.D_TOKEN }}/docker_nginx:1
        sleep 5
    - name: Check container 
      run: docker ps
    - name: Web App
      run: curl http://localhost:8080
    - name: Login
      run: docker login -u ${{ secrets.D_USER }} -p ${{ secrets.D_TOKEN}}
    - name: Push.
      run: docker push ${{ secrets.D_USERS }}/docker_nginx:1
